version: '2.22'

services:
  xray:
    image: ghcr.io/passimx/xray-server-instance:dev
    container_name: xray
    restart: always
    env_file: .env
    environment:
      - TZ=Europe/Amsterdam
      - XRAY_PORT=${XRAY_PORT:-443}
      - API_PORT=${API_PORT:-440}
    volumes:
      - ./xray/data:/etc/xray
      - ./xray/logs:/var/log/xray
      - ./xray/scripts:/etc/xray/scripts
    ports:
      - ${XRAY_PORT:-443}:${XRAY_PORT:-443}
      - ${API_PORT:-440}:${API_PORT:-440}
    networks:
      - network

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_ROLLING_RESTART=true
    command: xray
    depends_on:
      - xray
    networks:
      - network

networks:
  network:
    driver: bridge
    name: network